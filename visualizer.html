<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Pro Configurator | Sambandh Sales</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/environments/RoomEnvironment.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>

    <style>
        :root { --text-dark: #111111; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: var(--text-dark); overflow: hidden; position: fixed; width: 100%; height: 100%; background: #000;}

        .glass-fluted {
            background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.2) 0px, rgba(255,255,255,0.2) 1px, transparent 1px, transparent 8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .app-container { position: relative; width: 100vw; height: 100dvh; overflow: hidden; }
        .view-area { position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh; background: radial-gradient(circle at center, #ffffff 0%, #d8d8d8 100%); z-index: 1; cursor: grab; }
        .view-area:active { cursor: grabbing; }
        #canvas-container { width: 100%; height: 100%; display: block; }
        
        .ui-overlay { position: absolute; bottom: 20px; left: 30%; transform: translateX(-50%); padding: 8px 16px; border-radius: 20px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; pointer-events: none; z-index: 5;}

        header { position: absolute; top: 15px; left: 2.5%; width: 95%; height: 75px; z-index: 1000; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; }
        .logo { display: flex; align-items: center; gap: 15px; text-decoration: none;}
        .logo img { max-height: 35px; width: auto; }
        .logo-text { font-family: 'Playfair Display', serif; font-size: clamp(1.1rem, 2vw, 1.4rem); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dark); }
        
        nav ul { list-style: none; display: flex; gap: 35px; }
        nav a { text-decoration: none; color: var(--text-dark); font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; transition: opacity 0.3s; }
        nav a:hover { opacity: 0.5; }

        .hamburger { display: none; background: none; border: none; cursor: pointer; flex-direction: column; gap: 5px; z-index: 1001; padding: 10px;}
        .hamburger span { display: block; width: 25px; height: 2px; background-color: var(--text-dark); transition: all 0.3s; }

        /* MINIMALIST ARROW TOGGLE BUTTON */
        #config-toggle {
            position: absolute; right: 2.5%; top: 105px; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; z-index: 90; display: flex; align-items: center; justify-content: center; color: var(--text-dark); border: 1px solid rgba(255, 255, 255, 0.6); opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        #config-toggle:hover { background: rgba(255,255,255,0.7); transform: scale(1.05); }

        .controls-panel { position: absolute; right: 2.5%; top: 105px; width: 320px; height: calc(100dvh - 120px); display: flex; flex-direction: column; z-index: 100; border-radius: 16px; transition: transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s ease; transform: translateX(0); }
        .controls-panel.closed { transform: translateX(calc(100% + 40px)); opacity: 0.5; pointer-events: none; }
        
        .panel-header { padding: 25px 25px 10px; flex-shrink: 0;}
        .panel-header h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 2px; text-shadow: 0 2px 10px rgba(255,255,255,0.8);}
        .panel-header p { font-size: 0.7rem; color: #333; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        
        /* MINIMALIST CLOSE ARROW INSIDE PANEL */
        #close-config { background: none; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-dark); opacity: 0.5; transition: all 0.3s; margin-top: -5px; }
        #close-config:hover { opacity: 1; transform: scale(1.1); }

        .tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.6); padding: 0 25px; margin-top: 10px; flex-shrink: 0;}
        .tab-btn { flex: 1; background: transparent; border: none; padding: 10px 0; font-family: 'Inter', sans-serif; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #444; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.3s;}
        .tab-btn.active { color: var(--text-dark); border-bottom-color: var(--text-dark); }
        
        .tab-content { padding: 20px 25px; overflow-y: auto; flex-grow: 1; display: none; -webkit-overflow-scrolling: touch; }
        .tab-content.active { display: block; }
        .control-block { margin-bottom: 20px; }
        .control-block h3 { margin-bottom: 10px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #333; font-weight: 700;}
        
        button.option-btn { width: 100%; padding: 12px 16px; margin-bottom: 8px; background: rgba(255,255,255,0.45); border: 1px solid rgba(255,255,255,0.6); cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.75rem; font-weight: 600; text-align: left; display: flex; justify-content: space-between; border-radius: 6px; transition: all 0.3s;}
        button.option-btn.active { background: rgba(0,0,0,0.85); color: #fff; border-color: transparent;}
        
        .mixer-container { background: rgba(255,255,255,0.45); padding: 15px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.6); display: flex; flex-direction: column; align-items: center; }
        .mixer-preview { width: 100%; height: 40px; border-radius: 4px; background-color: #a3a3a3; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 0.8rem; font-weight: 600; }
        #color-dial { margin-bottom: 5px; touch-action: none; }

        #loader { position: absolute; inset: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(10px); z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 1.5rem; transition: opacity 0.5s; pointer-events: none;}
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-top: 3px solid var(--text-dark); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-top: 15px;}
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* MOBILE ADJUSTMENTS */
        @media (max-width: 900px) {
            .ui-overlay { left: 50%; }
            .controls-panel { top: auto; bottom: 15px; right: 2.5%; left: 2.5%; width: 95%; height: auto; max-height: 45%; }
            .controls-panel.closed { transform: translateY(calc(100% + 40px)); }
            
            #config-toggle { top: auto; bottom: 20px; right: 50%; transform: translateX(50%); width: 50px; height: 50px; padding: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.15);}
            #config-toggle:hover { transform: translateX(50%) scale(1.05); }
            
            /* Rotates arrows to point UP and DOWN on mobile */
            #config-toggle svg, #close-config svg { transform: rotate(90deg); }

            .panel-header { padding: 15px 20px 5px; } .panel-header h1 { font-size: 1.4rem; }
            .tabs { padding: 0 20px; } .tab-content { padding: 15px 20px; }
        }
        @media (max-width: 768px) {
            header { top: 10px; height: 65px; padding: 0 20px; }
            .hamburger { display: flex; }
            nav { position: fixed; top: 85px; left: -100%; width: 95%; height: calc(100dvh - 100px); border-radius: 16px; transition: left 0.3s ease; padding: 30px; z-index: 999; flex-direction: column; background: rgba(255,255,255,0.85); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.5); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
            nav.active { left: 2.5%; }
            nav ul { flex-direction: column; gap: 20px; }
            nav a { display: block; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 15px; font-size: 1.2rem;}
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="view-area">
            <div id="loader">Loading Geometry...<div class="spinner"></div></div>
            <div id="canvas-container"></div>
            <div class="ui-overlay glass-fluted">Rotate • Zoom</div>
        </div>

        <header class="glass-fluted">
            <a href="index.html" class="logo"><img src="logo.png" alt="Sambandh Sales Logo"><span class="logo-text">Sambandh Sales</span></a>
            <button class="hamburger" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
            <nav id="mobile-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="gallery.html">Products</a></li>
                    <li><a href="visualizer.html">Visualizer</a></li>
                    <li><a href="contact.html">Get in Touch</a></li>
                </ul>
            </nav>
        </header>

        <button id="config-toggle" class="glass-fluted">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>

        <div class="controls-panel glass-fluted" id="controls-panel">
            <div class="panel-header">
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div><h1>Configurator</h1><p>Interactive 3D Engine</p></div>
                    
                    <button id="close-config">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="openTab('tab-finish', this)">Design</button>
                <button class="tab-btn" onclick="openTab('tab-color', this)">Color</button>
                <button class="tab-btn" onclick="openTab('tab-light', this)">Lighting</button>
            </div>

            <div id="tab-finish" class="tab-content active">
                <div class="control-block">
                    <h3>1. Profile</h3>
                    <button class="option-btn active" onclick="changeShape('custom', this)"><span>DFG Pattern</span> <span>.GLB</span></button>
                    <button class="option-btn" onclick="changeShape('diamond', this)"><span>Diamond</span> <span>ALGO</span></button>
                    <button class="option-btn" onclick="changeShape('fluted', this)"><span>Fluted</span> <span>RIBBED</span></button>
                </div>
                <div class="control-block">
                    <h3>2. Texture</h3>
                    <button class="option-btn active" onclick="changeMaterial('matte', this)"><span>Raw Brutalist</span> <span>MATTE</span></button>
                    <button class="option-btn" onclick="changeMaterial('polished', this)"><span>Sealed</span> <span>GLOSS</span></button>
                </div>
            </div>

            <div id="tab-color" class="tab-content">
                <div class="control-block">
                    <h3>Pigment</h3>
                    <div class="mixer-container"><div class="mixer-preview" id="mixer-preview">#A3A3A3</div><div id="color-dial"></div></div>
                </div>
            </div>

            <div id="tab-light" class="tab-content">
                <div class="control-block">
                    <h3>Environment</h3>
                    <button class="option-btn active" onclick="changeLighting('interior', this)"><span>Soft Studio</span></button>
                    <button class="option-btn" onclick="changeLighting('exterior', this)"><span>Harsh Sunlight</span></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const configToggle = document.getElementById('config-toggle');
        const controlsPanel = document.getElementById('controls-panel');
        const closeConfig = document.getElementById('close-config');

        configToggle.addEventListener('click', () => {
            controlsPanel.classList.remove('closed');
            configToggle.style.opacity = '0';
            configToggle.style.pointerEvents = 'none';
        });

        closeConfig.addEventListener('click', () => {
            controlsPanel.classList.add('closed');
            configToggle.style.opacity = '1';
            configToggle.style.pointerEvents = 'auto';
        });

        const hamburger = document.querySelector('.hamburger');
        const nav = document.getElementById('mobile-nav');
        hamburger.addEventListener('click', () => { nav.classList.toggle('active'); });

        function openTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
            if(tabId === 'tab-color') { setTimeout(() => window.dispatchEvent(new Event('resize')), 50); }
        }

        const container = document.getElementById('canvas-container');
        const loader = document.getElementById('loader');
        const scene = new THREE.Scene();
        const isMobile = window.innerWidth < 768;

        const renderer = new THREE.WebGLRenderer({ antialias: !isMobile, alpha: true });
        renderer.setPixelRatio(isMobile ? 1 : Math.min(window.devicePixelRatio, 1.5));
        renderer.toneMapping = THREE.ACESFilmicToneMapping; 
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = isMobile ? THREE.PCFShadowMap : THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
        camera.position.set(isMobile ? 4 : 2, isMobile ? 3 : 2, isMobile ? 7 : 5); 

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.maxPolarAngle = Math.PI / 2 + 0.1; 
        controls.autoRotate = true; controls.autoRotateSpeed = 1.5;
        controls.target.set(isMobile ? 0 : -1, 1.5, 0);

        container.addEventListener('mousedown', () => { controls.autoRotate = false; });
        container.addEventListener('touchstart', () => { controls.autoRotate = false; }, {passive: true});

        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        scene.environment = pmremGenerator.fromScene(new THREE.RoomEnvironment()).texture;
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 10, 5); dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = isMobile ? 512 : 2048;
        dirLight.shadow.mapSize.height = isMobile ? 512 : 2048;
        scene.add(dirLight);

        const concreteMaterial = new THREE.MeshPhysicalMaterial({ color: '#a3a3a3', roughness: 0.9 });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1 }));
        floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true; scene.add(floor);

        let currentPanelGroup = null;

        function createDiamondRing(size, thickness, depth, mat) {
            const ring = new THREE.Group();
            const length = size / Math.sqrt(2);
            const geo = new THREE.BoxGeometry(length + thickness, thickness, depth);
            const offset = size / 4; 
            const s1 = new THREE.Mesh(geo, mat); s1.position.set(offset, offset, depth/2); s1.rotation.z = Math.PI/4; s1.castShadow = true; s1.receiveShadow = true;
            const s2 = new THREE.Mesh(geo, mat); s2.position.set(-offset, offset, depth/2); s2.rotation.z = -Math.PI/4; s2.castShadow = true; s2.receiveShadow = true;
            const s3 = new THREE.Mesh(geo, mat); s3.position.set(-offset, -offset, depth/2); s3.rotation.z = Math.PI/4; s3.castShadow = true; s3.receiveShadow = true;
            const s4 = new THREE.Mesh(geo, mat); s4.position.set(offset, -offset, depth/2); s4.rotation.z = -Math.PI/4; s4.castShadow = true; s4.receiveShadow = true;
            ring.add(s1, s2, s3, s4);
            return ring;
        }

        function buildShape(shapeType) {
            loader.style.opacity = '1';
            setTimeout(() => {
                if (currentPanelGroup) { scene.remove(currentPanelGroup); }
                currentPanelGroup = new THREE.Group();

                if (shapeType === 'custom') {
                    new THREE.GLTFLoader().load('DFG.glb', function(gltf) {
                        const model = gltf.scene;
                        model.traverse((child) => { if (child.isMesh) { child.material = concreteMaterial; child.castShadow = true; child.receiveShadow = true; } });
                        const box = new THREE.Box3().setFromObject(model);
                        model.position.sub(box.getCenter(new THREE.Vector3()));
                        const wrapper = new THREE.Group(); wrapper.add(model);
                        const maxDim = Math.max(...box.getSize(new THREE.Vector3()).toArray());
                        if(maxDim > 0) wrapper.scale.setScalar(3.2 / maxDim);
                        currentPanelGroup.add(wrapper); currentPanelGroup.position.y = 1.5; scene.add(currentPanelGroup);
                        loader.style.opacity = '0';
                    }); return; 
                } 
                else if (shapeType === 'fluted') {
                    const base = new THREE.Mesh(new THREE.BoxGeometry(2, 3, 0.1), concreteMaterial); base.castShadow = true; base.receiveShadow = true; currentPanelGroup.add(base);
                    for(let i=0; i<15; i++) {
                        const rib = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 3, 16), concreteMaterial);
                        rib.position.set(-0.84 + (i * 0.12), 0, 0.05); rib.castShadow = true; rib.receiveShadow = true; currentPanelGroup.add(rib);
                    }
                } 
                else if (shapeType === 'diamond') {
                    const base = new THREE.Mesh(new THREE.BoxGeometry(2.4, 3.2, 0.1), concreteMaterial); base.castShadow = true; base.receiveShadow = true; currentPanelGroup.add(base);
                }
                currentPanelGroup.position.y = 1.5; scene.add(currentPanelGroup);
                setTimeout(() => { loader.style.opacity = '0'; }, 200);
            }, 50); 
        }
        buildShape('custom');

        function changeShape(type, btn) {
            document.querySelectorAll('#tab-finish .option-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); buildShape(type);
        }

        function resizeCanvas() {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            if(colorPicker) colorPicker.resize(window.innerWidth < 400 ? 160 : 200);
        }
        window.addEventListener('resize', resizeCanvas); setTimeout(resizeCanvas, 100);

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); } animate();

        function changeMaterial(type, btn) {
            btn.parentElement.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            concreteMaterial.roughness = type === 'matte' ? 0.9 : 0.1;
            concreteMaterial.clearcoat = type === 'matte' ? 0.0 : 1.0;
            concreteMaterial.needsUpdate = true;
        }

        function changeLighting(type, btn) {
            document.querySelectorAll('#tab-light .option-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            dirLight.intensity = type === 'interior' ? 1.2 : 2.5;
            dirLight.position.set(type === 'interior' ? 5 : -10, type === 'interior' ? 10 : 15, type === 'interior' ? 5 : 10);
        }

        var colorPicker = new iro.ColorPicker("#color-dial", { width: 200, color: "#a3a3a3", borderWidth: 2, borderColor: "#ffffff", layout: [ { component: iro.ui.Wheel }, { component: iro.ui.Slider, options: { sliderType: 'value' } } ] });
        colorPicker.on('color:change', function(color) {
            concreteMaterial.color.set(color.hexString); 
            const box = document.getElementById('mixer-preview');
            box.style.backgroundColor = color.hexString; box.innerText = color.hexString.toUpperCase(); 
            box.style.color = color.hsl.l > 70 ? '#111' : '#fff';
        });
    </script>
</body>
</html>
